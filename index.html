<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaktamar Stotra - Divine Singing Journey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cloudflare.com" />

</head>
<body>

    <!-- Background Aura Graphic -->
    <div class="divine-aura"></div>

    <!-- MAIN HOME SCREEN -->
    <section id="home-screen" class="screen active">
        <img src="https://ibb.co" alt="Bhagwan Adinath Digambar" class="god-image animate__animated animate__fadeIn">
            <!-- Replace with actual Adinath Bhagwan image path -->
            <img src="https://i.ibb.co/xtg3bqwj/aadi.jpg" alt="Bhagwan Adinath Digambar" class="god-image">
           <h1 class="divine-line animate__animated animate__fadeInDown">Devotional Echoes of Rishabhadeva</h1>
           <p class="sub-line animate__animated animate__fadeInUp">Experience the spiritual energy of Bhaktamar stotra </p>
            <button id="start-btn" class="glow-button">Enter to your Divine Journey</button>
        </div>

        <!-- shreya ji Profile (Bottom Right) -->
        <div class="singer-profile">
            <!-- Replace with your friend's photo path -->
            <img src="https://i.ibb.co/XZy520th/shreya-ji.jpg" alt="shreya-ji" class="singer-photo">
            <div class="singer-info">
                <h3>shreya Jain and shruti Jain</h3>
                <p>Voice of Spirituality and love </p>
            </div>
        </div>
    </section>

    <!-- VIDEO PLAYER SCREEN -->
    <section id="video-screen" class="screen">
        <div class="video-container">
            <div class="verse-indicator">Verse <span id="current-verse-num">1</span> / <span id="total-verse-num">48</span></div>
            
            <!-- Video source is set dynamically by script.js (loadVerse), so no src is needed here -->
            <video id="stotra-video" controls></video>
            
            <div class="video-controls">
                <button id="prev-btn" class="nav-button">← Previous Verse</button>
                <button id="next-btn" class="nav-button">Next Verse →</button>
            </div>
            
            <button id="home-btn" class="back-home-btn">Back to Main Frame</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
